name: Social Media Auto-Post

on:
  # Scheduled posting temporarily disabled — re-enable by uncommenting below.
  # schedule:
  #   # 9am, 1pm, 6pm UTC every day
  #   - cron: "0 9,13,18 * * *"
  # Allow manual triggering from the Actions tab for testing
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    # Needed so GITHUB_TOKEN can commit the generated image back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run social poster
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python post.py
